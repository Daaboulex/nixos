# LACT config — declarative source of truth for /etc/lact/config.yaml (RX 9070 XT + GTX 1660 SUPER).
# Nix owns this file (read-only /etc symlink); edit HERE, not the GUI — GUI saves
# will not persist. The gpus key is vendor:device-subvendor:subdevice-pciaddr; if the
# gpus ever move PCIe slots, re-capture them. Held verbatim (not generated from a Nix
# attrset) because LACT's parser is strict about the fan-curve int keys + float format.
version: 5
daemon:
  log_level: info
  admin_group: wheel
  disable_clocks_cleanup: false
apply_settings_timer: 5
gpus:
  # Dedicated AMD GPU: Radeon RX 9070 XT
  1002:7550-1DA2:E489-0000:03:00.0:
    fan_control_enabled: false
    fan_control_settings:
      mode: curve
      static_speed: 0.5
      temperature_key: edge
      interval_ms: 500
      curve:
        33: 0.29
        47: 0.37
        59: 0.51
        67: 0.71
        74: 1.0
      spindown_delay_ms: 5000
      change_threshold: 2
    pmfw_options:
      target_temperature: 50
      zero_rpm: false
    power_cap: 280.5
    performance_level: auto
    max_memory_clock: 1309
    gpu_clock_offsets:
      0: 0
    voltage_offset: -70
  # Dedicated NVIDIA GPU: GeForce GTX 1660 SUPER
  10DE:21C4-19DA:5527-0000:05:00.0:
    power_cap: 125.0
    min_core_clock: 645
    max_core_clock: 1920
    gpu_clock_offsets:
      0: 150
    mem_clock_offsets:
      0: 1500 # Configured for Hynix VRAM. Change to 1000 if using Samsung/Micron VRAM.
current_profile: null
auto_switch_profiles: false
