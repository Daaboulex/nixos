name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Evaluate all host configurations
        run: bash scripts/ci-checks.sh eval

  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - name: Standards gates (flake checks — format / placement / dendritic / dangling)
        run: bash scripts/ci-checks.sh gates
      - name: Secret scan (gitleaks)
        # Backstop for the pre-commit gitleaks hook (the gates above exclude
        # pre-commit). Git mode → respects .gitignore, so repos/ is never scanned.
        run: nix run nixpkgs#gitleaks -- detect --redact --no-banner --config .gitleaks.toml --source .
