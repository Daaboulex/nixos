name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Evaluate all host configurations
        run: |
          failed=0
          for host in ryzen-9950x3d macbook-pro-9-2 pixel-9-pro; do
            printf "  %-25s " "$host"
            if nix eval ".#nixosConfigurations.$host.config.system.build.toplevel.drvPath" \
              --override-input site path:./ci/site-stub 2>/dev/null; then
              echo "OK"
            else
              echo "FAIL"
              failed=1
            fi
          done
          exit $failed

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix build .#docs --override-input site path:./ci/site-stub
